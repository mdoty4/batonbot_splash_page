    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is an AI agent orchestrator?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An AI agent orchestrator coordinates multiple AI agents and LLM calls into a repeatable workflow. Instead of chatting with one agent at a time, BatonBot lets you design a sequence of tasks on a Kanban board, assign the best agent to each step (baton-code, Aider, Cline, or Telegram), and execute the entire pipeline with one click while tracking live status."
          }
        },
        {
          "@type": "Question",
          "name": "Can I run AI coding agents with a local LLM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BatonBot is local-first: route all requests through LM Studio (or any local OpenAI-compatible server) for privacy and zero API cost, or connect to cloud APIs when you want maximum intelligence. Each project can have its own LLM configuration."
          }
        },
        {
          "@type": "Question",
          "name": "How do I automate Jira tickets with AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BatonBot's Jira channel polls Jira Cloud over outbound HTTPS — no webhook, tunnel, or public URL required. File a ticket, label it fix-now, and BatonBot imports it as a card, runs an agent on it, comments the result back on the ticket, and transitions it to Done. Trust guards (assignee guard, autostart cap, first-run watermark) are on by default."
          }
        },
        {
          "@type": "Question",
          "name": "Is BatonBot free and open source?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. BatonBot is free and MIT-licensed. Install from source with npm, run it with Docker, or download a portable no-install bundle for Windows x64 or macOS Apple Silicon — unzip and double-click, no Node or git required."
          }
        },
        {
          "@type": "Question",
          "name": "Does BatonBot work offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BatonBot runs entirely on your machine and can operate against a fully local model via LM Studio. A strict local-only mode (hard-failing any request that would leave the machine) is on the roadmap for v3.5."
          }
        },
        {
          "@type": "Question",
          "name": "Is BatonBot like Jira for AI agents?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "That's the idea — BatonBot is a project management board where AI agents work the tickets. Tasks live as cards in Pending, Queue, and Completed columns; you assign an agent to each card and hit Start. It even connects to real Jira: tickets flow onto the board, and results are commented back automatically."
          }
        },
        {
          "@type": "Question",
          "name": "What's the best way to run multiple AI coding agents at once?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use an orchestrator instead of juggling chat windows. With BatonBot you queue tasks on a kanban board, assign a different agent to each (baton-code, Aider, Cline), and execute the sequence in one click. BatonBot manages the hand-off between agents and streams live status for every task."
          }
        }
